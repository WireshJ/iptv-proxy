services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    restart: always
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - 8888:8888/tcp # gluetun HTTP proxy
      - 8388:8388/tcp # gluetun Shadowsocks
      - 8388:8388/udp # gluetun Shadowsocks
      - 8080:8080    # IPTV proxy
    volumes:
      - /data/apps/gluetun:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - OPENVPN_USER=CHANGE_ME
      - OPENVPN_PASSWORD=CHANGE_ME
      - SERVER_COUNTRIES=Netherlands
      - FREE_ONLY=on
      - TZ=Europe/Amsterdam
      - UPDATER_PERIOD=
      - HTTPPROXY=off
      - HTTP_CONTROL_SERVER_ADDRESS=:8001

  iptv-proxy:
    image: ghcr.io/wireshj/iptv-proxy:latest
    container_name: iptv-proxy
    volumes:
      # Mount a local m3u file instead of using a remote URL (optional)
      - /data/apps/iptv-proxy:/root/iptv
    restart: always
    environment:
      # Remote m3u URL (comment out if using local file)
      M3U_URL: http://PROVIDER_HOST:8000/get.php?username=CHANGE_ME&password=CHANGE_ME&type=m3u_plus&output=mpegts
      # Hostname or IP to expose IPTV endpoints (use the host machine IP, not Docker)
      HOSTNAME: CHANGE_ME
      PORT: 8080
      GIN_MODE: release
      # Proxy credentials (clients connect with these)
      USER: CHANGE_ME
      PASSWORD: CHANGE_ME
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
