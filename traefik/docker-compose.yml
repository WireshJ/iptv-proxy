services:
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yaml:/traefik.yaml:ro
      - ./acme.json:/acme.json        # create with: touch acme.json && chmod 600 acme.json
    networks:
      - proxy

  iptv-proxy:
    image: ghcr.io/wireshj/iptv-proxy:latest
    container_name: iptv-proxy
    restart: always
    volumes:
      # Optional: mount a local m3u file instead of using a remote URL
      - /data/apps/iptv-proxy:/root/iptv
    environment:
      # Remote m3u or Xtream URL (comment out if using local file)
      M3U_URL: http://PROVIDER_HOST:8000/get.php?username=CHANGE_ME&password=CHANGE_ME&type=m3u_plus&output=mpegts
      # Must match the domain in the Traefik label below
      HOSTNAME: iptv.yourdomain.com
      PORT: 8080
      ADVERTISED_PORT: 443
      HTTPS: "true"
      GIN_MODE: release
      # Proxy credentials (clients connect with these)
      USER: CHANGE_ME
      PASSWORD: CHANGE_ME
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.iptv-proxy.rule=Host(`iptv.yourdomain.com`)"
      - "traefik.http.routers.iptv-proxy.entrypoints=websecure"
      - "traefik.http.routers.iptv-proxy.tls.certresolver=letsencrypt"
      - "traefik.http.services.iptv-proxy.loadbalancer.server.port=8080"
    networks:
      - proxy

networks:
  proxy:
    driver: bridge
